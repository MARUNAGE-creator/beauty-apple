const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const log = (m) => { document.getElementById('log').textContent += "\n" + m; };

// プレビュー表示
const pv = document.getElementById('preview');
posts.forEach(p => {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `<img src="${p.image}"><div><div class="t">${p.title}</div><div class="tags">${p.tags.join(' / ')}</div></div>`;
  pv.appendChild(d);
});

window.run = async () => {
  const btn = document.getElementById('go');
  btn.disabled = true;
  document.getElementById('log').textContent = "登録開始...";
  try {
    for (const p of posts) {
      const ref = await addDoc(collection(db, "beauty_apple_posts"), p);
      log("✓ 登録成功: " + p.title + " (" + ref.id + ")");
    }
    log("\n完了！すべて登録されました。サイトを開いて確認してください。");
  } catch (e) {
    log("✗ エラー: " + e.message);
    log("→ Firestoreのルールで write が拒否された可能性があります。");
    btn.disabled = false;
  }
};
</script>
</body>
